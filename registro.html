<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IrMex - Registro</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app-container">
        <div class="logo-container">
            <img src="logoitl.png" alt="Logo IrMex"
                style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">
        </div>

        <h1>Creá una cuenta nueva</h1>

        <form id="registroForm" style="width: 100%;">
            <div class="form-group">
                <label for="nombre">Escribí tu nombre</label>
                <input type="text" id="nombre" required>
            </div>

            <div class="form-group">
                <label for="correo">Escribí tu correo electrónico</label>
                <input type="email" id="correo" required>
            </div>

            <div class="form-group">
                <label for="password">Escribí tu contraseña</label>
                <input type="password" id="password" required>
            </div>

            <div class="form-group">
                <label for="fecha">Escribí tu fecha de nacimiento</label>
                <input type="date" id="fecha" required>
            </div>

            <button type="submit" class="btn-principal">Siguiente</button>
        </form>

        <a href="index.html" class="enlace-secundario">¿Ya estás registrado? Ingresá</a>

        <p id="mensajeRespuesta" style="margin-top: 20px; font-weight: bold; text-align: center;"></p>
    </div>

    <script>
        document.getElementById('registroForm').addEventListener('submit', async function (event) {
            event.preventDefault();

            const nombre = document.getElementById('nombre').value;
            const correo = document.getElementById('correo').value;
            const password = document.getElementById('password').value;
            const fecha = document.getElementById('fecha').value;
            const mensajeElemento = document.getElementById('mensajeRespuesta');

            mensajeElemento.innerText = "Creando cuenta...";
            mensajeElemento.style.color = "var(--gris-texto)";

            try {
                const response = await fetch('http://127.0.0.1:8000/api/registro', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        nombre: nombre,
                        correo: correo,
                        password: password,
                        fecha_nacimiento: fecha
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    mensajeElemento.style.color = "green";
                    mensajeElemento.innerText = `¡Éxito! Cuenta creada.`;
                    // Redirigir al inicio de sesión después de 2 segundos
                    setTimeout(() => { window.location.href = "index.html"; }, 2000);
                } else {
                    mensajeElemento.style.color = "red";
                    mensajeElemento.innerText = data.detail;
                }
            } catch (error) {
                mensajeElemento.style.color = "red";
                mensajeElemento.innerText = "Error al conectar con el servidor.";
            }
        });
    </script>
</body>

</html>
