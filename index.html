<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IrMex - Ingreso</title>
</head>

<body>
    <h1>Bienvenido a IrMex</h1>
    <p>Plataforma digital de Pagobus</p>

    <form id="loginForm">
        <label for="correo">Correo Electrónico:</label><br>
        <input type="email" id="correo" required><br><br>

        <label for="password">Contraseña:</label><br>
        <input type="password" id="password" required><br><br>

        <button type="submit">Ingresar</button>
    </form>

    <p id="mensajeRespuesta" style="color: blue; font-weight: bold;"></p>

    <script>
        // Interceptamos el envío del formulario
        document.getElementById('loginForm').addEventListener('submit', async function (event) {
            event.preventDefault(); // Evita que la página recargue

            const correo = document.getElementById('correo').value;
            const password = document.getElementById('password').value;
            const mensajeElemento = document.getElementById('mensajeRespuesta');

            mensajeElemento.innerText = "Conectando...";

            try {
                // Hacemos la petición a tu API de FastAPI
                const response = await fetch('http://127.0.0.1:8000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ correo: correo, password: password })
                });

                const data = await response.json();

                if (response.ok) {
                    mensajeElemento.style.color = "green";
                    mensajeElemento.innerText = `¡Éxito! Bienvenido, tu ID es ${data.usuario_id}`;
                } else {
                    mensajeElemento.style.color = "red";
                    mensajeElemento.innerText = `Error: ${data.detail}`;
                }
            } catch (error) {
                mensajeElemento.style.color = "red";
                mensajeElemento.innerText = "Error al conectar con el servidor.";
            }
        });
    </script>
</body>

</html>
