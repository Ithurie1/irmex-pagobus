<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IrMex - Ingreso</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app-container">
        <div class="logo-container">
            <img src="logoitl.png" alt="Logo IrMex"
                style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">
        </div>

        <h1>¿Ya estás registrado? Ingresá</h1>

        <form id="loginForm" style="width: 100%;">
            <div class="form-group">
                <label for="correo">Escribí tu correo electrónico</label>
                <input type="email" id="correo" placeholder="hola@ejemplo.com" required>
            </div>

            <div class="form-group">
                <label for="password">Escribí tu contraseña</label>
                <input type="password" id="password" placeholder="******" required>
            </div>

            <button type="submit" class="btn-principal">Ingresar</button>
        </form>

        <a class="enlace-secundario">¿Olvidaste tu contraseña?</a>
        <a href="registro.html" class="enlace-secundario" style="margin-top: 10px;">¿No tienes cuenta? Regístrate</a>

        <p id="mensajeRespuesta" style="margin-top: 20px; font-weight: bold; text-align: center;"></p>
    </div>

    <script>
        // La misma lógica que ya programaste para conectar con FastAPI
        document.getElementById('loginForm').addEventListener('submit', async function (event) {
            event.preventDefault();

            const correo = document.getElementById('correo').value;
            const password = document.getElementById('password').value;
            const mensajeElemento = document.getElementById('mensajeRespuesta');

            mensajeElemento.innerText = "Verificando credenciales...";
            mensajeElemento.style.color = "var(--gris-texto)";

            try {
                const response = await fetch('http://127.0.0.1:8000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ correo: correo, password: password })
                });

                const data = await response.json();

                if (response.ok) {
                    // 1. Guardamos el Gafete VIP en la memoria del navegador
                    localStorage.setItem('token', data.access_token);
                    
                    mensajeElemento.style.color = "green";
                    mensajeElemento.innerText = `¡Bienvenido de vuelta, ${data.nombre}! Entrando...`;
                    
                    setTimeout(() => {
                        window.location.href = "dashboard.html";
                    }, 1000);
                } else {
                    mensajeElemento.style.color = "red";
                    mensajeElemento.innerText = data.detail;
                }
            } catch (error) {
                mensajeElemento.style.color = "red";
                mensajeElemento.innerText = "Error al conectar con el servidor.";
            }
        });
    </script>
</body>

</html>
