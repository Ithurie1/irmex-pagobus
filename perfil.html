<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IrMex - Mi Perfil</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .perfil-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .foto-perfil {
            width: 100px;
            height: 100px;
            background-color: #ccc;
            border-radius: 50%;
            margin: 0 auto 15px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            position: relative;
        }

        .btn-editar-foto {
            position: absolute;
            bottom: 0;
            right: 0;
            background-color: var(--azul-claro);
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="app-container">
        <div style="width: 100%; text-align: left; margin-bottom: 10px;">
            <a href="dashboard.html" style="text-decoration: none; color: var(--azul-medio); font-weight: bold;">←
                Volver al Inicio</a>
        </div>

        <div class="perfil-header">
            <div class="foto-perfil">
                👤
                <button class="btn-editar-foto">✏️</button>
            </div>
            <h2 style="color: var(--azul-oscuro);">Mi Perfil</h2>
        </div>

        <form style="width: 100%; overflow-y: auto; max-height: 500px; padding-right: 10px;">
            <h4 style="color: var(--azul-medio); margin-bottom: 10px;">Datos Generales</h4>
            <div class="form-group">
                <label>Nombre Completo</label>
                <input type="text" value="" readonly>
            </div>
            <div class="form-group">
                <label>Correo Electrónico (Institucional)</label>
                <input type="email" value="" readonly>
            </div>

            <h4 style="color: var(--azul-medio); margin-top: 20px; margin-bottom: 10px;">Información de Estudiante</h4>
            <div class="form-group">
                <label>CURP</label>
                <input type="text" placeholder="Ingresa tu CURP">
            </div>
            <div class="form-group">
                <label>Dirección</label>
                <input type="text" placeholder="Calle, Número, Colonia">
            </div>

            <h4 style="color: var(--azul-medio); margin-top: 20px; margin-bottom: 10px;">Seguridad</h4>
            <div class="form-group">
                <label>Nueva Contraseña</label>
                <input type="password" placeholder="******">
            </div>

            <button type="button" class="btn-principal" style="margin-top: 15px;">Guardar Cambios</button>
        </form>
    </div>

<script>
        async function cargarDatosPerfil() {
            // 1. Sacamos el token de la mochila del navegador
            const token = localStorage.getItem('token');
            
            // Si no hay token, lo regresamos al login a patadas
            if (!token) {
                window.location.href = "index.html";
                return;
            }

            try {
                // 2. Hacemos la petición al backend, enviando el token en la cabecera
                const response = await fetch('http://127.0.0.1:8000/api/perfil', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}` // Aquí enseñamos el gafete
                    }
                });

                if (response.ok) {
                    const datosUsuario = await response.json();
                    
                    // 3. Pintamos los datos reales en la pantalla
                    // Asumiendo que le pusiste id="nombrePerfil" e id="correoPerfil" a tus inputs
                    document.querySelector('input[type="text"]').value = datosUsuario.nombre;
                    document.querySelector('input[type="email"]').value = datosUsuario.correo;
                } else {
                    // Si el token caducó o es inválido
                    localStorage.removeItem('token');
                    window.location.href = "index.html";
                }
            } catch (error) {
                console.error("Error al conectar con el servidor", error);
            }
        }

        // Ejecutamos la función apenas cargue la página
        cargarDatosPerfil();
    </script>

</body>

</html>
